services:
  api:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - SAGEMAKER_ENDPOINT=healthops-anomaly-endpoint
      - OPA_URL=http://opa:8181
      - BEDROCK_MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0
      - ALLOWED_ORIGINS=http://localhost:8501,http://frontend:8501
      - ENVIRONMENT=development
    depends_on:
      - opa
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  opa:
    image: openpolicyagent/opa:0.68.0
    ports:
      - "8181:8181"
    command: run --server /policies
    volumes:
      - ./services/governance/policies:/policies:ro
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.streamlit
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
